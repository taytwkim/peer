<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <div class="panel backend-notice" id="backend-notice" hidden></div>

      <div class="page-title">
        <p class="eyebrow">TinyTorrent</p>
        <h1>Dashboard</h1>
      </div>

      <header class="hero">
        <div class="hero__controls">
          <div class="status-strip" id="status-strip"></div>
        </div>
      </header>

      <section class="network">
        <div class="peer-grid" id="peer-grid"></div>
      </section>

      <section class="workspace">
        <article class="panel panel--files">
          <div class="panel__header">
            <div>
              <p class="eyebrow">Catalog</p>
              <h3>Available Files</h3>
            </div>
          </div>
          <div class="file-list" id="file-list"></div>
        </article>

        <article class="panel panel--transfer">
          <div class="panel__header">
            <div>
              <p class="eyebrow">Transfer Activity</p>
              <h3 id="transfer-title">Transfer details</h3>
            </div>
            <span class="chip" id="transfer-chip">Idle</span>
          </div>

          <div id="transfer-content"></div>
        </article>
      </section>
    </div>

    <div class="modal" id="peer-files-modal" hidden>
      <div class="modal__backdrop" data-close-modal="true"></div>
      <div class="modal__dialog" role="dialog" aria-modal="true" aria-labelledby="peer-files-title">
        <div class="modal__header">
          <div>
            <p class="eyebrow">Peer Files</p>
            <h3 id="peer-files-title">Files</h3>
          </div>
          <button class="button button--ghost button--small" id="close-peer-files" type="button">Close</button>
        </div>
        <div class="modal__meta" id="peer-files-meta"></div>
        <div class="modal__body" id="peer-files-body"></div>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
